name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'  # Çdo branch

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Log in në Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: enessermaxhaj
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 3️⃣ Ndërto Docker image me tag latest dhe commit SHA
      - name: Build Docker image
        run: |
          IMAGE_NAME=enessermaxhaj/hello-eness
          TAG_LATEST=latest
          TAG_COMMIT=${{ github.sha }}
          docker build -t $IMAGE_NAME:$TAG_LATEST -t $IMAGE_NAME:$TAG_COMMIT .

      # 4️⃣ Push image në Docker Hub
      - name: Push Docker image
        run: |
          IMAGE_NAME=enessermaxhaj/hello-eness
          TAG_LATEST=latest
          TAG_COMMIT=${{ github.sha }}
          docker push $IMAGE_NAME:$TAG_LATEST
          docker push $IMAGE_NAME:$TAG_COMMIT